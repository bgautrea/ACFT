name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  IMAGE: docker.io/bgautrea/acft

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout - block on critical or high CVEs (grade < B)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE }}:scan-target
          only-severities: critical,high
          exit-code: true
          summary: true
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Pin kustomization to the new sha-tagged image
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          NEW_TAG="sha-${SHORT_SHA}"
          sed -i -E "s|^([[:space:]]*newTag:[[:space:]]+).*|\1${NEW_TAG}|" k8s/kustomization.yaml
          if git diff --quiet k8s/kustomization.yaml; then
            echo "kustomization already pinned to ${NEW_TAG}; nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "ci: pin kustomization image to ${NEW_TAG} [skip ci]"
          git push origin HEAD:main

      - name: Docker Scout - quickview summary (post-push)
        if: always()
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ env.IMAGE }}:scan-target
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

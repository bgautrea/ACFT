apiVersion: apps/v1
kind: Deployment
metadata:
  name: acft-thegeauxpro-com
  labels:
    app.kubernetes.io/name: acft-thegeauxpro-com
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: acft-thegeauxpro-com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acft-thegeauxpro-com
    spec:
      imagePullSecrets:
        - name: dockerhub
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx user in nginx:alpine
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: acft-thegeauxpro-com   # rewritten by kustomize
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 1
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 96Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
